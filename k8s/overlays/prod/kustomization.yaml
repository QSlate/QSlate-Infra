apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: qslate

resources:
  - ../../base/runner-api
  - externalsecrets/clustersecretstore.yaml
  - runner-api/externalsecret.yaml

patches:
  - path: runner-api/patch-image.yaml
    target:
      kind: Deployment
      name: runner
