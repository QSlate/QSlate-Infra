apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner
  labels:
    app: runner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner
  template:
    metadata:
      labels:
        app: runner
    spec:
      serviceAccountName: runner-sa
      containers:
        - name: runner
          image: runner:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: K8S_NAMESPACE
              value: qslate
            - name: K8S_S3_SECRET
              value: qslate-s3-secret
            - name: WORKER_IMAGE
              value: worker:latest
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: qslate-s3-secret
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: qslate-s3-secret
                  key: AWS_SECRET_ACCESS_KEY
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: qslate-s3-secret
                  key: S3_BUCKET
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: qslate-s3-secret
                  key: AWS_REGION
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
