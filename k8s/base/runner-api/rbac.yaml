apiVersion: v1
kind: Namespace
metadata:
  name: qslate

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runner-sa
  namespace: qslate

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runner-role
  namespace: qslate
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runner-rolebinding
  namespace: qslate
subjects:
  - kind: ServiceAccount
    name: runner-sa
    namespace: qslate
roleRef:
  kind: Role
  name: runner-role
  apiGroup: rbac.authorization.k8s.io
